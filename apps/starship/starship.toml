# ~/.config/starship.toml

format = """
$directory$git_branch$git_status$cmd_duration
$line_break$character"""
add_newline = true

[directory]
style = "blue"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
# fish_style_pwd_dir_length = 1 

[character]
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"

[git_branch]
symbol = " "
style = "yellow"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
disabled = false
format = '([$all_status$ahead_behind]($style) )'
style = "yellow"
conflicted = "󰞇 ${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇡${ahead_count} ⇣${behind_count} "
modified = "mod:${count} "
staged = "staged:${count} "
deleted = "del:${count} "
untracked = "new:${count} "
stashed = "stash:${count} "
renamed = "ren:${count} "

[cmd_duration]
min_time = 1000
format = "took [$duration]($style)"
style = "dimmed white"